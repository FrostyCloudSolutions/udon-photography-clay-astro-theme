<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Content Manager</title>
</head>
<body>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  <script>
    // Portfolio-post save rules the widget config can't express:
    // only one photo may be flagged as the listing thumbnail (the first
    // flagged one wins), and a blank publish date becomes "now" -- this
    // Decap version leaves the datetime field empty on new entries.
    CMS.registerEventListener({
      name: 'preSave',
      handler: function ({ entry }) {
        if (entry.get('collection') !== 'portfolio') return;
        let data = entry.get('data');

        const photos = data.get('photos');
        if (photos && photos.map) {
          let seen = false;
          data = data.set(
            'photos',
            photos.map(function (photo) {
              if (photo && photo.get && photo.get('thumbnail')) {
                if (seen) return photo.set('thumbnail', false);
                seen = true;
              }
              return photo;
            })
          );
          // Mirror the flagged (or first) photo into the top-level
          // thumbnail so the CMS grid cards have an image to show.
          const cover =
            data.get('photos').find(function (photo) {
              return photo && photo.get && photo.get('thumbnail');
            }) || data.get('photos').first();
          if (cover && cover.get) {
            data = data.set('thumbnail', cover.get('image'));
          }
        }

        if (!data.get('date')) {
          data = data.set('date', new Date().toISOString());
        }
        return data;
      },
    });

    // Make the per-photo "use as thumbnail" toggles behave like radio
    // buttons in the editor: switching one on switches the others off.
    // (The preSave hook above remains the data-level guarantee.)
    new MutationObserver(function (mutations) {
      if (!/\/collections\/portfolio\//.test(window.location.hash)) return;
      mutations.forEach(function (mutation) {
        const flipped = mutation.target;
        if (
          mutation.attributeName !== 'aria-checked' ||
          flipped.getAttribute('role') !== 'switch' ||
          flipped.getAttribute('aria-checked') !== 'true' ||
          mutation.oldValue === 'true' ||
          // Only photo-item toggles are radios; leave every other
          // switch in the editor (e.g. pane toggles) alone.
          !flipped.closest('[class*="SortableListItem"]')
        ) {
          return;
        }
        document
          .querySelectorAll('[class*="SortableListItem"] [role="switch"][aria-checked="true"]')
          .forEach(function (other) {
            if (other !== flipped) other.click();
          });
      });
    }).observe(document.body, {
      subtree: true,
      attributes: true,
      attributeFilter: ['aria-checked'],
      attributeOldValue: true,
    });

    // Hide the auto-managed "Thumbnail (auto)" control from the editor
    // form; it only exists so the collection cards have an image field.
    new MutationObserver(function () {
      document.querySelectorAll('label').forEach(function (label) {
        if (label.textContent.indexOf('Thumbnail (auto)') !== 0) return;
        const control = label.closest('[class*="ControlContainer"]');
        if (control && control.style.display !== 'none') control.style.display = 'none';
      });
    }).observe(document.body, { subtree: true, childList: true });

    // The datetime widget starts empty on new entries in this Decap
    // version, so click its own "Set date to now" button when an empty
    // date field mounts -- the publish date then visibly defaults to
    // now. Runs once per field mount, so deliberately clearing the date
    // afterwards is respected. The preSave hook stays as the fallback.
    // Held back until the draft-backup scan (below) finishes: clicking
    // "Now" dirties the fresh empty entry, and Decap then overwrites the
    // stored draft backup with that empty entry before it can be
    // restored. When a restorable backup exists for the entry, skip the
    // prefill entirely -- the backup carries its own date, and preSave
    // still defaults a blank date on publish.
    let backupScanDone = false;
    const backupKeys = new Set();
    const applyNowDefault = function () {
      if (!backupScanDone) return;
      const route = window.location.hash.match(/\/collections\/([^/]+)\/new\b/);
      if (route && backupKeys.has('backup.' + decodeURIComponent(route[1]))) return;
      document.querySelectorAll('input[type="datetime-local"]').forEach(function (input) {
        if (input.dataset.nowDefaulted === '1' || input.value) return;
        input.dataset.nowDefaulted = '1';
        const control = input.closest('[class*="ControlContainer"]') || document;
        const nowButton = [...control.querySelectorAll('button')].find(function (button) {
          return button.textContent.trim() === 'Now';
        });
        if (nowButton) nowButton.click();
      });
    };
    new MutationObserver(applyNowDefault).observe(document.body, { subtree: true, childList: true });

    // A freshly uploaded photo's editor preview points at its final site
    // URL (/img/...), which 404s until the entry is published and the
    // site redeploys -- Decap resolves draft uploads to a local blob for
    // top-level image fields but not for image fields nested in a list.
    // Remember an object URL for every file uploaded this session and
    // use it as the preview whenever Decap's resolution comes up broken,
    // so the real photo shows before publish. If the upload isn't from
    // this session (e.g. a restored draft after a reload), fall back to
    // an informative placeholder instead of a blank box.
    const uploadedPreviews = {};
    const registerPreview = function (name, url) {
      const key = name.toLowerCase();
      uploadedPreviews[key] = url;
      uploadedPreviews[key.replace(/\s+/g, '-')] = url;
      // Re-resolve any previews that already fell back to the placeholder.
      document.querySelectorAll('img[data-broken-base]').forEach(function (img) {
        const base = img.getAttribute('data-broken-base');
        if (uploadedPreviews[base]) img.src = uploadedPreviews[base];
      });
    };

    const normalizeName = function (name) {
      return name.trim().toLowerCase().replace(/\s+/g, '-');
    };
    const pendingUploadNames = [];
    const registerLocalFiles = function (files) {
      [...files].forEach(function (file) {
        registerPreview(file.name, URL.createObjectURL(file));
        pendingUploadNames.push(normalizeName(file.name));
      });
    };
    document.addEventListener(
      'change',
      function (event) {
        const input = event.target;
        if (!input || input.type !== 'file' || !input.files) return;
        registerLocalFiles(input.files);
      },
      true
    );
    // Drag-and-drop uploads never touch the file input, so no change
    // event fires; catch the dropped files too.
    document.addEventListener(
      'drop',
      function (event) {
        const files = event.dataTransfer && event.dataTransfer.files;
        if (files && files.length) registerLocalFiles(files);
      },
      true
    );

    // A media library card is the parent of its filename label. Draft
    // uploads add a "Draft" badge <p> inside the card, and generic
    // selectors like [class*="-Card"] also match the grid container and
    // the card's inner wrappers, so anchor on the CardText label.
    const eachMediaCard = function (callback) {
      document.querySelectorAll('p[class*="CardText"]').forEach(function (label) {
        if (label.parentElement) callback(label.parentElement, label.textContent);
      });
    };

    // After an upload, Decap enables "Choose selected" without the new
    // card actually being selected, so choosing silently inserts
    // nothing. Click the fresh card for real once it renders. The click
    // can race the library's own selection reset while the modal is
    // still settling, so verify the insert button actually enabled and
    // retry a few times if not.
    const clickMediaCard = function (card) {
      ['pointerdown', 'mousedown', 'pointerup', 'mouseup', 'click'].forEach(function (type) {
        card.dispatchEvent(new MouseEvent(type, { bubbles: true, cancelable: true, view: window }));
      });
    };
    const selectMediaCard = function (card, attempt) {
      clickMediaCard(card);
      if (attempt >= 5) return;
      setTimeout(function () {
        const choose = [...document.querySelectorAll('button')].find(function (button) {
          return button.textContent.trim() === 'Choose selected';
        });
        if (choose && choose.disabled && document.contains(card)) selectMediaCard(card, attempt + 1);
      }, 400);
    };
    new MutationObserver(function () {
      if (!pendingUploadNames.length) return;
      eachMediaCard(function (card, name) {
        if (card.getAttribute('data-auto-selected')) return;
        const index = pendingUploadNames.indexOf(normalizeName(name));
        if (index === -1) return;
        pendingUploadNames.splice(index, 1);
        card.setAttribute('data-auto-selected', '1');
        selectMediaCard(card, 1);
      });
    }).observe(document.body, { subtree: true, childList: true });

    // Decap puts the "Add photo" button in a bar above the photo list,
    // but adding flows downward -- reorder that bar below the items
    // (style-only, so React's DOM is untouched).
    new MutationObserver(function () {
      document.querySelectorAll('[class*="ObjectWidgetTopBar"]:not([data-moved-below])').forEach(function (topBar) {
        const hasAdd = [...topBar.querySelectorAll('button')].some(function (button) {
          return button.textContent.trim() === 'Add photo';
        });
        if (!hasAdd) return;
        topBar.setAttribute('data-moved-below', '1');
        const container = topBar.parentElement;
        container.style.display = 'flex';
        container.style.flexDirection = 'column';
        topBar.style.order = '99';
      });
    }).observe(document.body, { subtree: true, childList: true });

    // The media library renders draft uploads from their in-memory
    // bytes; harvest those object URLs as another preview source (this
    // covers drafts restored after a reload once the library opens).
    new MutationObserver(function () {
      eachMediaCard(function (card, name) {
        const img = card.querySelector('img[src^="blob:"]:not([data-harvested])');
        if (!img) return;
        img.setAttribute('data-harvested', '1');
        name = name.trim();
        if (name && !uploadedPreviews[name.toLowerCase()]) registerPreview(name, img.src);
      });
    }).observe(document.body, { subtree: true, childList: true });

    // Decap backs up draft entries -- including the uploaded file bytes
    // -- in IndexedDB. Read those bytes back on load and register
    // object URLs, so drafts restored from a previous session show real
    // previews without waiting for the media library to open.
    // The scan also records which backup keys exist, so the publish-date
    // prefill above knows when a draft is waiting to be restored.
    (function hydratePreviewsFromBackups() {
      const finish = function () {
        if (backupScanDone) return;
        backupScanDone = true;
        applyNowDefault();
      };
      try {
        const open = indexedDB.open('localforage');
        open.onerror = finish;
        open.onsuccess = function () {
          const db = open.result;
          if (!db.objectStoreNames.contains('keyvaluepairs')) return finish();
          const cursorReq = db.transaction('keyvaluepairs', 'readonly').objectStore('keyvaluepairs').openCursor();
          cursorReq.onerror = finish;
          cursorReq.onsuccess = function () {
            const cursor = cursorReq.result;
            if (!cursor) return finish();
            const value = cursor.value;
            if (value && value.raw && typeof cursor.key === 'string') backupKeys.add(cursor.key);
            if (value && value.mediaFiles && value.mediaFiles.forEach) {
              value.mediaFiles.forEach(function (mediaFile) {
                const blob = mediaFile && (mediaFile.file || mediaFile.blob);
                if (blob instanceof Blob && mediaFile.name) {
                  registerPreview(mediaFile.name, URL.createObjectURL(blob));
                }
              });
            }
            cursor.continue();
          };
        };
      } catch (ignore) {
        finish();
      }
    })();

    const PREVIEW_PLACEHOLDER =
      'data:image/svg+xml,' +
      encodeURIComponent(
        '<svg xmlns="http://www.w3.org/2000/svg" width="240" height="160">' +
          '<rect width="240" height="160" fill="#eceef1"/>' +
          '<text x="120" y="72" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#444">Photo attached</text>' +
          '<text x="120" y="96" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#777">preview appears after publish</text>' +
          '</svg>'
      );
    const swapBrokenPreview = function (img) {
      if (!img.src || img.src.indexOf('data:') === 0 || img.src.indexOf('blob:') === 0) return;
      let replacement = PREVIEW_PLACEHOLDER;
      try {
        const base = decodeURIComponent(img.src.split('/').pop()).toLowerCase();
        // Remember which file this preview wanted, so registerPreview can
        // upgrade the placeholder to the real image when the bytes arrive.
        img.setAttribute('data-broken-base', base);
        if (uploadedPreviews[base]) replacement = uploadedPreviews[base];
      } catch (ignore) {}
      img.src = replacement;
    };
    new MutationObserver(function () {
      document.querySelectorAll('img:not([data-broken-preview-bound])').forEach(function (img) {
        img.setAttribute('data-broken-preview-bound', '1');
        img.addEventListener('error', function () {
          swapBrokenPreview(img);
        });
        if (img.complete && img.naturalWidth === 0) {
          swapBrokenPreview(img);
        }
      });
    }).observe(document.body, { subtree: true, childList: true });
  </script>
</body>
</html>
