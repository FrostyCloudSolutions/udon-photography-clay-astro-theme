backend:
  name: github
  repo: FrostyCloudSolutions/udon-photography-clay-astro-theme
  branch: main
  base_url: https://udonphoto.com
  auth_endpoint: auth
  commit_messages:
    # create: "Create {{collection}} “{{slug}}”"
    # update: "Update {{collection}} “{{slug}}”"
    # delete: "Delete {{collection}} “{{slug}}”"
    # uploadMedia: "[skip ci] Upload “{{path}}”"
    # deleteMedia: "[skip ci] Delete “{{path}}”"
    create: 'Create {{collection}} {{slug}}'
    update: 'Update {{collection}} {{slug}}'
    delete: 'Delete {{collection}} {{slug}}'
    uploadMedia: '[skip ci] Upload {{path}}'
    deleteMedia: '[skip ci] Delete {{path}}'

# local_backend: true
# removed local_backend: true to transfer compatibility from Netlify to cloudflare pages
media_folder: public/img
public_folder: /img

collections:
  - name: "pages"
    label: "Pages"
    files:
      - file: "src/content/pages/index.md"
        label: "Home"
        name: "index"
        fields:
          - {
              label: "Template Key",
              name: "templateKey",
              widget: "hidden",
              default: "index-page",
            }
          - {
              label: "Thumbnail",
              name: "thumbnail",
              widget: image,
              choose_url: false,
            }
          - { label: Title, name: title, widget: string }
          - { label: "Description", name: "description", widget: "string" }
          - { label: "Body", name: "body", widget: "markdown" }

      - file: "src/content/pages/about.md"
        label: "About"
        name: "about"
        fields:
          - {
              label: "Template Key",
              name: "templateKey",
              widget: "hidden",
              default: "about-page",
            }
          - {
              label: "Thumbnail",
              name: "thumbnail",
              widget: image,
              choose_url: false,
            }
          - { label: "Date", name: "date", widget: "date" }
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Description", name: "description", widget: "string" }
          - { label: "Numbering", name: "number", widget: "number" }
          - {
              label: "Page Type",
              name: "pagetype",
              widget: "select",
              multiple: true,
              min: 1,
              options: [{ label: "Main", value: "main" }],
            }
          - { label: "Body", name: "body", widget: "markdown" }

      - file: "src/content/pages/portfolio.md"
        label: "Portfolio"
        name: "portfolio"
        fields:
          - {
              label: "Template Key",
              name: "templateKey",
              widget: "hidden",
              default: "portfolio-page",
            }
          - {
              label: "Thumbnail",
              name: "thumbnail",
              widget: image,
              choose_url: false,
            }
          - { label: "Date", name: "date", widget: "date" }
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Description", name: "description", widget: "string" }
          - { label: "Body", name: "body", widget: "markdown" }
          - { label: "Numbering", name: "number", widget: "number" }

      - file: "src/content/pages/inquire.md"
        label: "Inquire"
        name: "inquire"
        fields:
          - {
              label: "Template Key",
              name: "templateKey",
              widget: "hidden",
              default: "inquire-page",
            }
          - {
              label: "Thumbnail",
              name: "thumbnail",
              widget: image,
              choose_url: false,
            }
          - { label: "Date", name: "date", widget: "date" }
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Description", name: "description", widget: "string" }
          - { label: "Body", name: "body", widget: "markdown" }
          - { label: "Numbering", name: "number", widget: "number" }
          - {
              label: "Page Type",
              name: "pagetype",
              widget: "select",
              multiple: true,
              min: 1,
              options: [{ label: "Main", value: "main" }],
            }

  - name: "portfolio"
    label: "Portfolio Posts"
    folder: "src/content/work"
    create: true
    slug: "{{slug}}"
    summary: "{{title}} — {{date | date('MMM D, YYYY')}}"
    sortable_fields: ["date", "title", "category"]
    fields:
      - {
          label: "Template Key",
          name: "templateKey",
          widget: "hidden",
          default: "work-sub-page",
        }
      - {
          label: "Category",
          name: "category",
          widget: "select",
          options:
            [
              "Babies",
              "Maternity",
              "Events",
              "Weddings",
              "Pets",
              "Collaborative Art",
              "Commercial Work",
              "Workshops",
            ],
        }
      - {
          label: "Thumbnail",
          name: "thumbnail",
          widget: image,
          choose_url: false,
        }
      - {
          label: "Gallery",
          name: "gallery",
          widget: "list",
          required: false,
          field: { label: "Image", name: "image", widget: "image", choose_url: false },
          hint: "Extra photos shown as a click-to-fullscreen gallery on this post's page. Add as many as you like.",
        }
      - {
          label: "Publish Date",
          name: "date",
          widget: "datetime",
          date_format: "DD/MM/YYYY",
          time_format: "hh:mm a",
          format: "YYYY-MM-DDTHH:mm:ssZ",
          picker_utc: false,
        }
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Description", name: "description", widget: "text" }
      - { label: "Body", name: "body", widget: "markdown" }
