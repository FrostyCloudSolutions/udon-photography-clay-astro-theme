backend:
  name: github
  repo: FrostyCloudSolutions/udon-photography-clay-astro-theme
  branch: main
  base_url: https://udonphoto.com
  auth_endpoint: auth
  commit_messages:
    # create: "Create {{collection}} “{{slug}}”"
    # update: "Update {{collection}} “{{slug}}”"
    # delete: "Delete {{collection}} “{{slug}}”"
    # uploadMedia: "[skip ci] Upload “{{path}}”"
    # deleteMedia: "[skip ci] Delete “{{path}}”"
    create: 'Create {{collection}} {{slug}}'
    update: 'Update {{collection}} {{slug}}'
    delete: 'Delete {{collection}} {{slug}}'
    # No [skip ci] here: media commits must trigger a Cloudflare Pages
    # build, or uploaded images never reach the live site and previews
    # that point at /img/... stay broken.
    uploadMedia: 'Upload {{path}}'
    deleteMedia: 'Delete {{path}}'

# local_backend: true
# removed local_backend: true to transfer compatibility from Netlify to cloudflare pages
media_folder: public/img
public_folder: /img

collections:
  - name: "pages"
    label: "Pages"
    files:
      - file: "src/content/pages/index.md"
        label: "Home"
        name: "index"
        fields:
          - {
              label: "Template Key",
              name: "templateKey",
              widget: "hidden",
              default: "index-page",
            }
          - {
              label: "Thumbnail",
              name: "thumbnail",
              widget: image,
              choose_url: false,
            }
          - { label: Title, name: title, widget: string }
          - { label: "Description", name: "description", widget: "string" }
          - { label: "Body", name: "body", widget: "markdown" }

      - file: "src/content/pages/about.md"
        label: "About"
        name: "about"
        fields:
          - {
              label: "Template Key",
              name: "templateKey",
              widget: "hidden",
              default: "about-page",
            }
          - {
              label: "Thumbnail",
              name: "thumbnail",
              widget: image,
              choose_url: false,
            }
          - { label: "Date", name: "date", widget: "date" }
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Description", name: "description", widget: "string" }
          - { label: "Numbering", name: "number", widget: "number" }
          - {
              label: "Page Type",
              name: "pagetype",
              widget: "select",
              multiple: true,
              min: 1,
              options: [{ label: "Main", value: "main" }],
            }
          - { label: "Body", name: "body", widget: "markdown" }

      - file: "src/content/pages/portfolio.md"
        label: "Portfolio"
        name: "portfolio"
        fields:
          - {
              label: "Template Key",
              name: "templateKey",
              widget: "hidden",
              default: "portfolio-page",
            }
          - {
              label: "Thumbnail",
              name: "thumbnail",
              widget: image,
              choose_url: false,
            }
          - { label: "Date", name: "date", widget: "date" }
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Description", name: "description", widget: "string" }
          - { label: "Body", name: "body", widget: "markdown" }
          - { label: "Numbering", name: "number", widget: "number" }

      - file: "src/content/pages/inquire.md"
        label: "Inquire"
        name: "inquire"
        fields:
          - {
              label: "Template Key",
              name: "templateKey",
              widget: "hidden",
              default: "inquire-page",
            }
          - {
              label: "Thumbnail",
              name: "thumbnail",
              widget: image,
              choose_url: false,
            }
          - { label: "Date", name: "date", widget: "date" }
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Description", name: "description", widget: "string" }
          - { label: "Body", name: "body", widget: "markdown" }
          - { label: "Numbering", name: "number", widget: "number" }
          - {
              label: "Page Type",
              name: "pagetype",
              widget: "select",
              multiple: true,
              min: 1,
              options: [{ label: "Main", value: "main" }],
            }

  - name: "portfolio"
    label: "Portfolio Posts"
    folder: "src/content/work"
    create: true
    slug: "{{slug}}"
    summary: "{{title}} — {{date | date('MMM D, YYYY')}}"
    sortable_fields: ["date", "title", "category"]
    fields:
      - {
          label: "Template Key",
          name: "templateKey",
          widget: "hidden",
          default: "work-sub-page",
        }
      - { label: "Title", name: "title", widget: "string" }
      - {
          label: "Publish Date",
          name: "date",
          widget: "datetime",
          date_format: "DD/MM/YYYY",
          time_format: "hh:mm a",
          format: "YYYY-MM-DDTHH:mm:ssZ",
          picker_utc: false,
        }
      - {
          label: "Category",
          name: "category",
          widget: "select",
          options:
            [
              "Babies",
              "Maternity",
              "Events",
              "Weddings",
              "Pets",
              "Collaborative Art",
              "Commercial Work",
              "Workshops",
            ],
        }
      # Auto-managed mirror of the flagged photo (or the first photo).
      # Kept in sync by the preSave hook in admin/index.html; it exists so
      # the CMS entry cards and grid view have a top-level image to show.
      # It must be an image widget for the cards to use it, so a script in
      # admin/index.html hides it from the editor form instead.
      - {
          label: "Thumbnail (auto)",
          name: "thumbnail",
          widget: "image",
          required: false,
          choose_url: false,
        }
      - label: "Photos"
        name: "photos"
        widget: "list"
        label_singular: "photo"
        summary: "{{fields.image}}"
        hint: "All photos for this post, in display order (drag to rearrange). Tick 'Use as thumbnail' on the one that should represent the post in the portfolio grid; otherwise the first photo is used. If a gray 'Photo attached' box ever appears in place of a preview, the photo is still attached — it will display normally once the post is published and the site finishes updating."
        fields:
          - { label: "Image", name: "image", widget: "image", choose_url: false }
          - {
              label: "Caption (optional)",
              name: "caption",
              widget: "string",
              required: false,
            }
          - {
              label: "Use as thumbnail in the portfolio grid",
              name: "thumbnail",
              widget: "boolean",
              default: false,
              required: false,
            }
      - { label: "Description", name: "description", widget: "text" }
      - { label: "Body", name: "body", widget: "markdown" }
