backend:
  name: github
  repo: FrostyCloudSolutions/udon-photography-clay-astro-theme
  branch: main
  base_url: https://udonphoto.com
  auth_endpoint: auth
  commit_messages:
    # create: "Create {{collection}} “{{slug}}”"
    # update: "Update {{collection}} “{{slug}}”"
    # delete: "Delete {{collection}} “{{slug}}”"
    # uploadMedia: "[skip ci] Upload “{{path}}”"
    # deleteMedia: "[skip ci] Delete “{{path}}”"
    create: 'Create {{collection}} {{slug}}'
    update: 'Update {{collection}} {{slug}}'
    delete: 'Delete {{collection}} {{slug}}'
    uploadMedia: '[skip ci] Upload {{path}}'
    deleteMedia: '[skip ci] Delete {{path}}'

# local_backend: true
# removed local_backend: true to transfer compatibility from Netlify to cloudflare pages
media_folder: public/img
public_folder: /img

collections:
  - name: "journal"
    label: "Journal"
    folder: "src/content/news"
    create: true
    slug: "{{slug}}"
    fields:
      - {
          label: "Template Key",
          name: "templateKey",
          widget: "hidden",
          default: "blog-post",
        }
      - {
          label: "Thumbnail",
          name: "thumbnail",
          widget: image,
          choose_url: false,
        }
      - {
          label: "Publish Date",
          name: "date",
          widget: "datetime",
          date_format: "DD/MM/YYYY",
          time_format: "hh:mm a",
          format: "YYYY-MM-DDTHH:mm:ssZ",
          picker_utc: false,
        }
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Description", name: "description", widget: "text" }
      - { label: "Body", name: "body", widget: "markdown" }
      # - {
      #     label: "Nature of Enquiry",
      #     name: "nature-of-enquiry",
      #     widget: "select",
      #     multiple: true,
      #     min: 1,
      #     options:
      #       [
      #         { label: "General", value: "general" },
      #         { label: "Purchase", value: "purchase" },
      #         { label: "Commissions", value: "commissions" },
      #         { label: "Exhibitions", value: "exhibitions" },
      #         { label: "Gallery Feature", value: "gallery-feature" },
      #         { label: "Other", value: "other" },
      #       ],
      #   }
  - name: "portfolio"
    label: "Portfolio"
    folder: "src/content/work"
    create: true
    slug: "{{slug}}"
    fields:
      - {
          label: "Template Key",
          name: "templateKey",
          widget: "hidden",
          default: "work-sub-page",
        }
      - {
          label: "Thumbnail",
          name: "thumbnail",
          widget: image,
          choose_url: false,
        }
      - {
          label: "Publish Date",
          name: "date",
          widget: "datetime",
          date_format: "DD/MM/YYYY",
          time_format: "hh:mm a",
          format: "YYYY-MM-DDTHH:mm:ssZ",
          picker_utc: false,
        }
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Description", name: "description", widget: "text" }
      - { label: "Body", name: "body", widget: "markdown" }
  - name: "sold"
    label: "Sold"
    folder: "src/content/sold"
    create: true
    slug: "{{slug}}"
    fields:
      - {
          label: "Template Key",
          name: "templateKey",
          widget: "hidden",
          default: "exhibitions-sub-page",
        }
      - {
          label: "Thumbnail",
          name: "thumbnail",
          widget: image,
          choose_url: false,
        }
      - {
          label: "Publish Date",
          name: "date",
          widget: "datetime",
          date_format: "DD/MM/YYYY",
          time_format: "hh:mm a",
          format: "YYYY-MM-DDTHH:mm:ssZ",
          picker_utc: false,
        }
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Description", name: "description", widget: "text" }
      - { label: "Body", name: "body", widget: "markdown" }

  - name: "pages"
    label: "Pages"
    files:
      - file: "src/content/pages/index.md"
        label: "Home"
        name: "index"
        fields:
          - {
              label: "Template Key",
              name: "templateKey",
              widget: "hidden",
              default: "index-page",
            }
          - {
              label: "Thumbnail",
              name: "thumbnail",
              widget: image,
              choose_url: false,
            }
          - { label: Title, name: title, widget: string }
          - { label: "Description", name: "description", widget: "string" }
          - { label: "Body", name: "body", widget: "markdown" }

      - file: "src/content/pages/about.md"
        label: "About"
        name: "about"
        fields:
          - {
              label: "Template Key",
              name: "templateKey",
              widget: "hidden",
              default: "about-page",
            }
          - {
              label: "Thumbnail",
              name: "thumbnail",
              widget: image,
              choose_url: false,
            }
          - { label: "Date", name: "date", widget: "date" }
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Description", name: "description", widget: "string" }
          - { label: "Numbering", name: "number", widget: "number" }
          - {
              label: "Page Type",
              name: "pagetype",
              widget: "select",
              multiple: true,
              min: 1,
              options: [{ label: "Main", value: "main" }],
            }
          - { label: "Body", name: "body", widget: "markdown" }

      - file: "src/content/pages/portfolio.md"
        label: "Portfolio"
